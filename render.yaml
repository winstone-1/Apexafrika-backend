services:
  - type: web
    name: apexafrika-web
    runtime: docker
    repo: https://github.com/winstone-1/Apexafrika-backend
    plan: starter
    dockerfilePath: ./Dockerfile.prod
    dockerContext: .
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: PORT
        value: "8000"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings
      - key: ALLOWED_HOSTS
        value: apexafrika.onrender.com,localhost,127.0.0.1
      - key: DB_NAME
        fromDatabase:
          name: apexafrika-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: apexafrika-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: apexafrika-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: apexafrika-db
          property: hostname
      - key: DB_PORT
        fromDatabase:
          name: apexafrika-db
          property: port
      - key: REDIS_HOST
        fromService:
          name: apexafrika-redis
          type: redis
          property: hostname
      - key: REDIS_PORT
        fromService:
          name: apexafrika-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: apexafrika-redis
          type: redis
          property: password
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_SECRET_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_MERCHANT_EMAIL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://apexafrika.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://apexafrika.com,https://www.apexafrika.com,https://api.apexafrika.com

  - type: worker
    name: apexafrika-celery
    runtime: docker
    repo: https://github.com/winstone-1/Apexafrika-backend
    plan: starter
    dockerfilePath: ./Dockerfile.prod
    dockerContext: .
    command: celery -A core worker --loglevel=info --concurrency=4
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DB_NAME
        fromDatabase:
          name: apexafrika-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: apexafrika-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: apexafrika-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: apexafrika-db
          property: hostname
      - key: DB_PORT
        fromDatabase:
          name: apexafrika-db
          property: port
      - key: REDIS_HOST
        fromService:
          name: apexafrika-redis
          type: redis
          property: hostname
      - key: REDIS_PORT
        fromService:
          name: apexafrika-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: apexafrika-redis
          type: redis
          property: password
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_SECRET_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

  - type: worker
    name: apexafrika-celery-beat
    runtime: docker
    repo: https://github.com/winstone-1/Apexafrika-backend
    plan: starter
    dockerfilePath: ./Dockerfile.prod
    dockerContext: .
    command: celery -A core beat --loglevel=info
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DB_NAME
        fromDatabase:
          name: apexafrika-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: apexafrika-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: apexafrika-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: apexafrika-db
          property: hostname
      - key: DB_PORT
        fromDatabase:
          name: apexafrika-db
          property: port
      - key: REDIS_HOST
        fromService:
          name: apexafrika-redis
          type: redis
          property: hostname
      - key: REDIS_PORT
        fromService:
          name: apexafrika-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: apexafrika-redis
          type: redis
          property: password
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_SECRET_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: apexafrika-db
    plan: starter
    databaseName: apexafrika_db
    user: apexafrika_user

redis:
  - name: apexafrika-redis
    plan: starter
    maxmemoryPolicy: noeviction
