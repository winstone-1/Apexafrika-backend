name: Deploy ApexAfrika Backend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================
  # Job 1: Build and Push Docker Image
  # ============================================
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/apexafrika-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/apexafrika-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/apexafrika-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/apexafrika-backend:buildcache,mode=max

  # ============================================
  # Job 2: Deploy to Render
  # ============================================
  deploy-to-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Trigger Render Deployment
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "Triggering deployment on Render..."
          curl -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "true"}'
          
          echo "Waiting for deployment to start..."
          sleep 5
          
          # Get deployment status
          DEPLOY_URL="https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys"
          DEPLOY_RESPONSE=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" $DEPLOY_URL)
          DEPLOY_ID=$(echo $DEPLOY_RESPONSE | jq -r '.[0].id')
          DEPLOY_STATUS=$(echo $DEPLOY_RESPONSE | jq -r '.[0].status')
          
          echo "Deployment ID: $DEPLOY_ID"
          echo "Deployment Status: $DEPLOY_STATUS"
          
          if [ "$DEPLOY_STATUS" != "live" ]; then
            echo "Deployment is in progress..."
            echo "Check Render dashboard for details."
          else
            echo "✅ Deployment successful!"
          fi
      
      - name: Verify Deployment
        run: |
          echo "Waiting for service to be ready..."
          sleep 30
          
          # Health check
          HEALTH_URL="https://apexafrika-backend.onrender.com/health/"
          for i in {1..10}; do
            echo "Health check attempt $i..."
            if curl -s -f "$HEALTH_URL" > /dev/null 2>&1; then
              echo "✅ Service is healthy!"
              exit 0
            fi
            sleep 5
          done
          
          echo "⚠️ Health check timeout, but deployment may still be starting."
          echo "Check Render dashboard for final status."

  # ============================================
  # Job 3: Run Tests (Optional)
  # ============================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: apexafrika_user
          POSTGRES_PASSWORD: apexafrika_pass
          POSTGRES_DB: apexafrika_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run migrations
        env:
          DB_NAME: apexafrika_db
          DB_USER: apexafrika_user
          DB_PASSWORD: apexafrika_pass
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          python manage.py migrate
      
      - name: Run tests
        env:
          DB_NAME: apexafrika_db
          DB_USER: apexafrika_user
          DB_PASSWORD: apexafrika_pass
          DB_HOST: localhost
          DB_PORT: 5432
          DJANGO_SECRET_KEY: test-secret-key
        run: |
          python manage.py test --verbosity=2
