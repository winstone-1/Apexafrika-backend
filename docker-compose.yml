services:
  db:
    image: postgres:15-alpine
    container_name: apexafrika_db
    environment:
      POSTGRES_DB: apexafrika_db
      POSTGRES_USER: apexafrika_user
      POSTGRES_PASSWORD: apexafrika_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apexafrika_user -d apexafrika_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - apexafrika_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: apexafrika_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - apexafrika_network
    restart: unless-stopped

  web:
    build: .
    container_name: apexafrika_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - log_volume:/app/logs
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_ENV=development
      - DB_HOST=db
      - REDIS_HOST=redis
      - DEBUG=True
      - DB_NAME=apexafrika_db
      - DB_USER=apexafrika_user
      - DB_PASSWORD=apexafrika_pass
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - apexafrika_network
    restart: unless-stopped

  celery:
    build: .
    container_name: apexafrika_celery
    command: celery -A core worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
      - log_volume:/app/logs
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - DB_NAME=apexafrika_db
      - DB_USER=apexafrika_user
      - DB_PASSWORD=apexafrika_pass
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - apexafrika_network
    restart: unless-stopped

  celery-beat:
    build: .
    container_name: apexafrika_celery_beat
    command: celery -A core beat --loglevel=info
    volumes:
      - .:/app
      - log_volume:/app/logs
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - DB_NAME=apexafrika_db
      - DB_USER=apexafrika_user
      - DB_PASSWORD=apexafrika_pass
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - apexafrika_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  log_volume:

networks:
  apexafrika_network:
    driver: bridge
