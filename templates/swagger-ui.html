<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexAfrika API Documentation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        .api-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 30px;
            border-bottom: 2px solid #FFB300;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .api-header .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .api-header .logo h1 {
            color: #FFB300;
            font-size: 24px;
            margin: 0;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .api-header .logo span {
            color: #ffffff;
            font-size: 14px;
            opacity: 0.7;
        }
        .api-header .badges {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .api-header .badges .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-version { background: #FFB300; color: #1a1a2e; }
        .badge-status { background: #00e676; color: #1a1a2e; }
        .badge-auth { background: #1a1a2e; color: #FFB300; border: 1px solid #FFB300; }
        @media (max-width: 768px) {
            .api-header { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
        .swagger-ui .topbar { background-color: #1a1a2e !important; }
        .swagger-ui .topbar .download-url-wrapper .select-label { color: #FFB300 !important; }
        .swagger-ui .info .title { color: #FFB300 !important; }
        .swagger-ui .info .description { color: #ffffff !important; }
        .swagger-ui .info .description p { color: #cccccc !important; }
        .swagger-ui .scheme-container { background-color: #16213e !important; border-color: #1a1a2e !important; }
        .swagger-ui .btn { background-color: #FFB300 !important; color: #1a1a2e !important; }
        .swagger-ui .btn:hover { background-color: #ffca28 !important; }
        .swagger-ui .opblock .opblock-summary-method { background-color: #FFB300 !important; color: #1a1a2e !important; }
        .swagger-ui .opblock { background-color: #16213e !important; border-color: #1a1a2e !important; }
        .swagger-ui .opblock .opblock-summary { color: #ffffff !important; }
        .swagger-ui .opblock .opblock-summary .opblock-summary-description { color: #ffffff !important; }
        .swagger-ui .opblock .opblock-summary .opblock-summary-path { color: #ffffff !important; }
        .swagger-ui .opblock .opblock-section { background-color: #1a1a2e !important; }
        .swagger-ui .opblock .opblock-section .opblock-section-header { background-color: #16213e !important; border-color: #1a1a2e !important; }
        .swagger-ui .opblock .opblock-section .opblock-section-header .tab-header { color: #ffffff !important; }
        .swagger-ui .parameter__name { color: #ffffff !important; }
        .swagger-ui .parameter__in { color: #FFB300 !important; }
        .swagger-ui .parameters-col_description .parameter__type { color: #ffffff !important; }
        .swagger-ui .model-box { background-color: #1a1a2e !important; border-color: #1a1a2e !important; color: #ffffff !important; }
        .swagger-ui .model-title { color: #ffffff !important; }
        .swagger-ui .tab-header .tab-item { color: #ffffff !important; }
        .swagger-ui .tab-header .tab-item.active { color: #FFB300 !important; }
        .swagger-ui .models { background-color: #1a1a2e !important; border-color: #1a1a2e !important; }
        .swagger-ui .models .model-container { background-color: #16213e !important; border-color: #1a1a2e !important; }
        .swagger-ui .models .model-container .models-control .model-title { color: #ffffff !important; }
    </style>
</head>
<body>
    <div class="api-header">
        <div class="logo">
            <h1>ApexAfrika</h1>
            <span>API v1.0.0</span>
        </div>
        <div class="badges">
            <span class="badge badge-version">v1.0.0</span>
            <span class="badge badge-status">Live</span>
            <span class="badge badge-auth">JWT + OAuth</span>
        </div>
    </div>
    <div id="swagger-ui"></div>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.9.0/swagger-ui-bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.9.0/swagger-ui-standalone-preset.js"></script>
    <script>
        window.onload = function() {
            const ui = SwaggerUIBundle({
                url: "{{ schema_url }}",
                dom_id: '#swagger-ui',
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "BaseLayout",
                deepLinking: true,
                persistAuthorization: true,
                displayOperationId: true,
                displayRequestDuration: true,
                filter: true,
                requestSnippetsEnabled: true,
                tryItOutEnabled: true,
                defaultModelsExpandDepth: 3,
                defaultModelExpandDepth: 3,
                docExpansion: 'none',
                syntaxHighlight: {
                    activated: true,
                    theme: 'agate',
                },
            });
            window.ui = ui;
        };
    </script>
</body>
</html>
